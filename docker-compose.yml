services:
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: healix-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://healix-kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@healix-kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: healix-redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  event-router:
    build:
      context: ./rust-worker
      dockerfile: Dockerfile
    container_name: healix-event-router
    depends_on:
      - kafka
      - redis
    restart: unless-stopped
    environment:
      - KAFKA_BROKER=healix-kafka:9092
      - REDIS_URL=redis://healix-redis:6379

  postgres:
    image: postgres:15-alpine
    container_name: healix-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: healix_admin
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: healix_tenant_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  kafka_data:
  redis_data:
  postgres_data:
